<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kannada Matras Trainer</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Kannada:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    body { font-family: Inter, system-ui, sans-serif; }
    .kn { font-family: 'Noto Sans Kannada', Inter, system-ui, sans-serif; }
    .shadow-soft { box-shadow: 0 6px 24px rgba(2,6,23,0.06), 0 2px 8px rgba(2,6,23,0.04); }
    .screen { display:none; }
    .screen.active { display:block; }
    .timer-ring {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      font-weight: 600;
      font-size: 1.1rem;
      color: #334155;
    }
    .timer-ring::after {
      content: attr(data-time);
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900">
<div class="max-w-3xl mx-auto p-6">

  <!-- Header -->
  <header class="flex items-center gap-3 mb-6">
    <div class="text-xl">🕉️</div>
    <h1 class="text-2xl font-bold">Kannada Matras Trainer</h1>
    <div class="ml-auto text-sm text-slate-500">Matras</div>
  </header>

  <section id="screen-home" class="screen active">
    <div class="bg-white rounded-2xl shadow-soft p-8 text-center space-y-6">

      <h2 class="text-lg text-slate-600">ಕಾಗುಣಿತ → देवनागरी</h2>

      <div id="quick-stats" class="grid grid-cols-3 gap-4"></div>

      <p id="last-session-info" class="text-slate-600"></p>

      <!-- Settings -->
      <div class="grid sm:grid-cols-2 gap-4 text-left">
        <div>
          <label class="block text-sm font-medium mb-2">Number of Cards</label>
          <input id="cards-count" type="number" min="5" max="100" value="20"
            class="w-full rounded-lg border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-300" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Timer</label>
          <select id="timer-seconds"
            class="w-full rounded-lg border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-300">
            <option value="5" selected>5s</option>
            <option value="3">3s</option>
            <option value="2">2s</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Practice Mode</label>
          <select id="session-mode"
            class="w-full rounded-lg border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-300">
            <option value="mixed" selected>Mixed deck</option>
            <option value="family">All matras for a random consonant</option>
            <option value="matra">All consonants for a random matra</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Distractors</label>
          <select id="distractor-mode"
            class="w-full rounded-lg border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-300">
            <option value="same-base" selected>Harder: same consonant family</option>
            <option value="classic">Classic deck options</option>
          </select>
        </div>
      </div>

      <button id="btn-start"
        class="w-full py-4 bg-black text-white rounded-xl text-lg font-semibold hover:bg-slate-800">
        Start Session
      </button>

      <button id="btn-weak"
        class="w-full py-4 border rounded-xl text-lg font-semibold hover:bg-slate-50">
        Practice Weak Matras (&lt;99%)
      </button>

      <button id="btn-toggle-history"
        class="w-full py-4 border rounded-xl text-lg hover:bg-slate-50">
        Show History
      </button>

      <!-- History -->
      <div id="history-panel" class="hidden text-left">
        <div class="rounded-xl border border-slate-200 bg-slate-50 p-3">
          <div class="flex justify-between text-xs mb-2">
            <span>Recent Runs</span>
            <button id="btn-clear-history" class="underline">Clear</button>
          </div>
          <ul id="history-list" class="text-xs divide-y"></ul>
        </div>
      </div>

    </div>
  </section>

  <!-- ===== Play ===== -->
  <section id="screen-play" class="screen">
    <div class="bg-white rounded-2xl shadow-soft p-8">

      <div class="flex items-center mb-6">
        <div class="font-semibold text-slate-600">Practice</div>
        <div class="ml-auto">
          <div id="timer-ring" class="timer-ring" data-time=""></div>
        </div>
      </div>

      <div class="w-full bg-slate-100 rounded-full h-1.5 mb-6">
        <div id="progress-bar" class="bg-slate-800 h-1.5 rounded-full transition-all duration-300" style="width:0%"></div>
      </div>

      <div class="text-center mb-8">
        <div id="prompt" class="kn text-8xl font-bold">ಕ</div>
      </div>

      <div id="options-box" class="space-y-3 max-w-md mx-auto"></div>

      <div class="mt-8 text-sm text-slate-500 flex justify-between">
        <div>Card <span id="card-index">1</span>/<span id="card-total">20</span></div>
        <div>Score <span id="score">0</span></div>
      </div>
    </div>
  </section>

  <!-- ===== Results ===== -->
  <section id="screen-results" class="screen">
    <div class="bg-white rounded-2xl shadow-soft p-8">

      <h2 class="text-2xl font-bold mb-6">Session Complete</h2>

      <div class="grid sm:grid-cols-3 gap-4">
        <div class="rounded-xl border p-4">
          <div class="text-sm text-slate-500">Accuracy</div>
          <div id="stat-acc" class="text-2xl font-bold">—</div>
        </div>
        <div class="rounded-xl border p-4">
          <div class="text-sm text-slate-500">Avg Response</div>
          <div id="stat-avg" class="text-2xl font-bold">—</div>
        </div>
        <div class="rounded-xl border p-4">
          <div class="text-sm text-slate-500">Fastest / Slowest</div>
          <div id="stat-range" class="text-2xl font-bold">—</div>
        </div>
      </div>

      <div class="mt-6">
        <h3 class="font-semibold mb-2">Wrong Items</h3>
        <ul id="wrong-list" class="space-y-2 text-sm"></ul>
      </div>

      <div class="mt-8 flex gap-3">
        <button id="btn-retry-mistakes"
          class="flex-1 py-3 border rounded-xl hover:bg-slate-50">
          Retry Mistakes
        </button>
        <button id="btn-newrun"
          class="flex-1 py-3 rounded-xl bg-black text-white rounded-xl hover:bg-slate-800">
          Home
        </button>
      </div>

    </div>
  </section>

</div>

    // ---------- Helpers ----------
    const qs = (sel, el=document) => el.querySelector(sel);

    function show(which){ Object.values(screens).forEach(s=> s && s.classList.remove('active')); if(screens[which]) screens[which].classList.add('active'); }

    const Settings = {
      load(){
        try{
          const s = JSON.parse(localStorage.getItem('kft_settings')||'{}');
          if(s.cardsCount) qs('#cards-count').value = s.cardsCount;
          if(s.timerSec) qs('#timer-seconds').value = String(s.timerSec);
          if(s.sessionMode) qs('#session-mode').value = s.sessionMode;
          if(s.distractorMode) qs('#distractor-mode').value = s.distractorMode;
        }catch{}
      },
      save(){
        const s = {
          cardsCount: Number(qs('#cards-count').value||20),
          timerSec: Number(qs('#timer-seconds').value||5),
          sessionMode: qs('#session-mode')?.value || 'mixed',
          distractorMode: qs('#distractor-mode')?.value || 'same-base',
          level: '2',
        };
        localStorage.setItem('kft_settings', JSON.stringify(s));
        return s;
      }
    };

    // ---------- History storage ----------
    const HistoryStore = {
      key: 'kft_history',
      read(){ try{ return JSON.parse(localStorage.getItem(this.key)||'[]'); }catch{ return []; } },
      write(arr){ localStorage.setItem(this.key, JSON.stringify(arr.slice(0,10))); },
      clear(){ localStorage.removeItem(this.key); }
    };


    // ---------- Progress (per-item stats) ----------
    // Stored separately from history so we can drive targeted practice modes.
    // Keyed by row.id (stable), with attempts/correct + confusion counts.
    const ProgressStore = {
      key: 'kft_matras_progress_v1',
      read(){
        try{ return JSON.parse(localStorage.getItem(this.key)||'{}'); }catch{ return {}; }
      },
      write(obj){
        localStorage.setItem(this.key, JSON.stringify(obj));
      },
      get(){
        const p = this.read();
        if(!p || typeof p !== 'object') return { version:1, itemStats:{} };
        if(!p.version) p.version = 1;
        if(!p.itemStats || typeof p.itemStats !== 'object') p.itemStats = {};
        return p;
      },
      reset(){ localStorage.removeItem(this.key); }
    };

    function getItemStat(progress, id){
      if(!progress.itemStats[id]) progress.itemStats[id] = { attempts:0, correct:0, wrongByOption:{} };
      const s = progress.itemStats[id];
      if(!s.wrongByOption || typeof s.wrongByOption !== 'object') s.wrongByOption = {};
      return s;
    }

    function recordAttempt(row, wasCorrect, chosenOpt){
      const progress = ProgressStore.get();
      const st = getItemStat(progress, String(row.id));
      st.attempts += 1;
      if(wasCorrect) st.correct += 1;
      else {
        const key = String(chosenOpt ?? '—');
        st.wrongByOption[key] = (st.wrongByOption[key] || 0) + 1;
      }
      ProgressStore.write(progress);
    }

    const WEAK_DEFAULTS = { minAttempts: 8, threshold: 0.99 };

    function isWeak(row, progress, minAttempts=WEAK_DEFAULTS.minAttempts, threshold=WEAK_DEFAULTS.threshold){
      const st = progress.itemStats?.[String(row.id)];
      if(!st) return false;
      const attempts = Number(st.attempts||0);
      if(attempts < minAttempts) return false;
      const acc = attempts ? (Number(st.correct||0) / attempts) : 0;
      return acc < threshold;
    }

    // ---------- Parser ----------
    function parseTable(text){
      const t = text.replace(/\r?\n/g, '\n'); // normalize CRLF
      const firstLine = t.split('\n')[0] || '';
      const delimiter = (firstLine.split('\t').length > firstLine.split(',').length) ? '\t' : ',';
      const lines = t.split('\n').filter(l=> l.trim()!=='');
      if(!lines.length) return [];
      const header = splitRow(lines[0], delimiter).map(h=>h.trim());
      const out = [];
      for(let i=1;i<lines.length;i++){
        const cells = splitRow(lines[i], delimiter);
        if(cells.every(c=> String(c).trim()==='')) continue;
        const obj = {};
        header.forEach((h, idx)=> obj[h] = (cells[idx]!==undefined ? String(cells[idx]).trim() : ''));
        obj.__line = i+1; // keep original line number (1-based)
        out.push(obj);
      }
      return out;
    }

    function splitRow(line, delimiter){
      const isTab = delimiter==='\t';
      const res = []; let cell=''; let inQ=false;
      for(let i=0;i<line.length;i++){
        const ch = line[i];
        if(ch==='"'){
          if(inQ && line[i+1]==='"'){ cell+='"'; i++; continue; }
          inQ = !inQ; continue;
        }
        if(!inQ && ((isTab && ch==='\t') || (!isTab && ch===','))){ res.push(cell); cell=''; continue; }
        cell += ch;
      }
      res.push(cell);
      return res;
    }

    function validateRows(rows, headerLine=1){
      const valid=[], invalid=[];
      for(const r of rows){
        const line = r.__line ?? headerLine+1;
        const prompt = (r.prompt||'').trim();
        const levelNum = Number(r.level||1);
        const options = String(r.options||'').split('|').map(s=>s.trim()).filter(Boolean);
        const idx = Number(r.correct_idx);
        if(!prompt){ invalid.push({ line, reason: 'missing prompt' }); continue; }
        if(!options || options.length<2){ invalid.push({ line, reason: 'need at least 2 options' }); continue; }
        if(Number.isNaN(idx)){ invalid.push({ line, reason: 'correct_idx missing/NaN' }); continue; }
        if(idx<0 || idx>=options.length){ invalid.push({ line, reason: 'correct_idx out of range' }); continue; }
        valid.push({
          id: r.id || (self.crypto && crypto.randomUUID ? crypto.randomUUID() : ('id_'+Math.random().toString(36).slice(2))),
          level: levelNum,
          prompt,
          options,
          correctIdx: idx,
          translit_latn: r.translit_latn||'',
          tag: r.tag||''
        });
      }
      return { valid, invalid };
    }



    // ---------- Scheduler (Leitner‑lite) ----------
    function createScheduler(items){
      const recs = items.map(r=>({ id:r.id, row:r, box:1, nextDue:0 }));
      let step = 0;
      const byId = new Map(recs.map(r=>[r.id, r]));
      function pickDue(){
        const due = recs.filter(x=>x.nextDue<=step);
        if(due.length===0){
          const minNext = Math.min(...recs.map(x=>x.nextDue));
          step = Math.max(step+1, minNext);
          return pickDue();
        }
        return due[Math.floor(Math.random()*due.length)];
      }
      return {
        step: ()=>step,
        next(){ step++; const rec = pickDue(); return rec.row; },
        record(id, correct){
          const rec = byId.get(id); if(!rec) return;
          if(correct){ rec.box = Math.min(3, rec.box+1); }
          else { rec.box = 1; }
          rec.nextDue = step + rec.box;
        }
      };
    }

    }

    function uniqueStrings(arr){
      const seen = new Set();
      const out = [];
      for(const item of arr){
        const val = String(item ?? '').trim();
        if(!val || seen.has(val)) continue;
        seen.add(val);
        out.push(val);
      }
      return out;
    }

    function sampleShuffled(arr, n){
      return shuffle([...arr]).slice(0, Math.max(0, n));
    }

    function buildBaseGroups(rows){
      const map = new Map();
      rows.forEach(r=>{
        const base = getBaseConsonant(r.prompt);
        if(!base) return;
        if(!map.has(base)) map.set(base, []);
        map.get(base).push(r);
      });
      return map;
    }

    function buildMatraGroups(rows){
      const map = new Map();
      rows.forEach(r=>{
        const key = getMatraKey(r.prompt);
        if(!map.has(key)) map.set(key, []);
        map.get(key).push(r);
      });
      return map;
    }

    function buildCard(row, pool, distractorMode='same-base'){
      const correct = getCorrectAnswer(row);
      const optionCount = Math.max(3, row.options?.length || 3);
      if(distractorMode === 'classic'){
        const options = uniqueStrings([...(row.options||[])]);
        const correctIdx = options.indexOf(correct);
        return { row, prompt: row.prompt, options, correctIdx: Math.max(0, correctIdx) };
      }

      const base = getBaseConsonant(row.prompt);
      const sameBaseRows = pool.filter(r => r.id !== row.id && getBaseConsonant(r.prompt) === base);
      const sameBaseAnswers = uniqueStrings(sameBaseRows.map(getCorrectAnswer).filter(a => a !== correct));

      const originalWrong = uniqueStrings((row.options||[]).filter((opt, idx)=> idx !== row.correctIdx));
      const poolWrong = uniqueStrings(pool.filter(r=>r.id !== row.id).map(getCorrectAnswer).filter(a => a !== correct));

      let distractors = [];
      distractors.push(...sampleShuffled(sameBaseAnswers, Math.min(optionCount - 1, sameBaseAnswers.length)));

      if(distractors.length < optionCount - 1){
        const needed = optionCount - 1 - distractors.length;
        const originalFill = originalWrong.filter(opt => !distractors.includes(opt) && opt !== correct);
        distractors.push(...sampleShuffled(originalFill, needed));
      }

      if(distractors.length < optionCount - 1){
        const needed = optionCount - 1 - distractors.length;
        const poolFill = poolWrong.filter(opt => !distractors.includes(opt) && opt !== correct);
        distractors.push(...sampleShuffled(poolFill, needed));
      }

      distractors = uniqueStrings(distractors).slice(0, optionCount - 1);
      const options = shuffle(uniqueStrings([correct, ...distractors]));
      const correctIdx = options.indexOf(correct);
      return { row, prompt: row.prompt, options, correctIdx };
    }

    function startSession({ fromMistakesOnly=false, weakOnly=false, minAttempts=WEAK_DEFAULTS.minAttempts, threshold=WEAK_DEFAULTS.threshold } = {}){ sessionAlive = true;
      const s = Settings.save();
      const progress = ProgressStore.get();
      let pool = deckRaw.filter(r=> String(r.level)==='2');
      if(fromMistakesOnly && session && session.mistakes.length){ pool = session.mistakes.map(m=>m.row); }
      if(weakOnly){
        pool = pool.filter(r=> isWeak(r, progress, minAttempts, threshold));
        if(pool.length===0){
          alert(`No weak matras found yet. Criteria: attempts ≥ ${minAttempts} AND accuracy < ${Math.round(threshold*100)}%. Keep practicing normally for a few sessions first.`);
          return;
        }
      }
      if(pool.length===0){ alert('No matras cards found in the loaded deck. Load CSV or use the sample.'); return; }

      let sessionLabel = 'Mixed deck';
      let chosenBase = '';
      let chosenMatra = '';

      if(!fromMistakesOnly && !weakOnly && s.sessionMode === 'family'){
        const baseGroups = buildBaseGroups(pool);
        const candidateBases = Array.from(baseGroups.keys()).filter(base => (baseGroups.get(base)||[]).length >= 3);
        if(candidateBases.length){
          chosenBase = candidateBases[Math.floor(Math.random()*candidateBases.length)];
          pool = [...(baseGroups.get(chosenBase) || [])];
          sessionLabel = `Consonant drill: ${chosenBase}`;
        }
      } else if(!fromMistakesOnly && !weakOnly && s.sessionMode === 'matra'){
        const matraGroups = buildMatraGroups(pool);
        const candidateMatras = Array.from(matraGroups.keys()).filter(key => (matraGroups.get(key)||[]).length >= 3);
        if(candidateMatras.length){
          chosenMatra = candidateMatras[Math.floor(Math.random()*candidateMatras.length)];
          pool = [...(matraGroups.get(chosenMatra) || [])];
          sessionLabel = `Matra drill: ${chosenMatra || 'no sign'}`;
        }
      } else if(fromMistakesOnly){
        sessionLabel = 'Retry mistakes';
      } else if(weakOnly){
        sessionLabel = 'Weak matras';
      }

      const requestedCount = Math.max(1, Number(s.cardsCount)||20);
      const effectiveCount = Math.min(requestedCount, pool.length);
      const queue = shuffle([...pool]).slice(0, effectiveCount);

      session = { idx:0, total:queue.length, score:0, mistakes:[], times:[], timerSec:Number(s.timerSec)||5, current:null, level:s.level, pool:[...pool], queue, distractorMode:s.distractorMode || 'same-base', sessionMode:s.sessionMode || 'mixed', chosenBase, chosenMatra, label:sessionLabel };
      elCardTotal.textContent = String(session.total);
      elScore.textContent = '0';
      const labelEl = document.getElementById('session-label');
      if(labelEl){
        const distractorText = session.distractorMode === 'same-base' ? 'harder same-family options' : 'classic options';
        labelEl.textContent = `${sessionLabel} • ${distractorText}`;
      }
      show('play');
      renderNext();
    }

    function renderNext(){
      if(session.idx >= session.total){ endSession(); return; }
      const progressBar = document.getElementById('progress-bar');
      if(progressBar) progressBar.style.width = Math.round((session.idx / session.total) * 100) + '%';
      const row = session.queue[session.idx];
      const card = buildCard(row, session.pool, session.distractorMode);
      session.current = card;
      renderCard(card);
      runTimer();
    }

    function renderCard(card){
      elPrompt.textContent = card.prompt;
      elPrompt.classList.add('kn');
      optionsBox.innerHTML='';
      card.options.forEach((opt, i)=>{
        const btn = document.createElement('button');
        btn.className = 'w-full text-left px-4 py-3 rounded-xl border border-slate-200 hover:bg-slate-50 flex items-center gap-3 focus:outline-none focus:ring-2 focus:ring-slate-300 transition-colors transition-opacity duration-300';
        btn.dataset.index = i;
        btn.innerHTML = `<span class="optnum text-slate-400 w-6">${i+1}</span><span class="text-lg">${escapeHtml(opt)}</span>`;
        btn.addEventListener('click', ()=> choose(i));
        optionsBox.appendChild(btn);
      });
      elCardIndex.textContent = String(session.idx+1);
      setTimerLabel(session.timerSec);
      lastStartTs = performance.now();
    }

    function choose(i){
      if(isLocked) return; isLocked = true;
      stopTimer();
      const card = session.current;
      const row = card.row;
      const elapsed = Math.max(0, (performance.now()-lastStartTs)/1000);
      session.times.push(elapsed);
      const correct = (i===card.correctIdx);
      // Update persistent per-item stats (attempts/correct + confusion)
      recordAttempt(row, correct, card.options[i]);
      const buttons = qsa('button', optionsBox);
      buttons.forEach((b)=> b.classList.add('pointer-events-none'));

      if(correct){
        buttons.forEach((b, idx)=>{
          const num = b.querySelector('.optnum');
          if(idx===card.correctIdx){
            b.classList.remove('border-slate-200');
            b.classList.add('bg-green-500','text-white','border-green-600');
            if(num) num.classList.add('text-white');
          } else {
            b.classList.add('opacity-0');
            setTimeout(()=>{ b.classList.add('hidden'); }, 200);
          }
        });
        session.score += 1; elScore.textContent = String(session.score);
        setTimeout(()=>{ isLocked=false; session.idx++; renderNext(); }, 1200);
      } else {
        buttons.forEach((b, idx)=>{
          const num = b.querySelector('.optnum');
          if(idx===card.correctIdx){
            b.classList.remove('border-slate-200');
            b.classList.add('bg-green-500','text-white','border-green-600');
            if(num) num.classList.add('text-white');
          }
          if(idx===i){
            b.classList.remove('border-slate-200');
            b.classList.add('bg-rose-500','text-white','border-rose-600');
            if(num) num.classList.add('text-white');
          }
          if(idx!==card.correctIdx && idx!==i){ b.classList.add('opacity-60'); }
        });
        session.mistakes.push({ row, chosen: card.options[i], correct: card.options[card.correctIdx] });
        setTimeout(()=>{ isLocked=false; session.idx++; renderNext(); }, 1000);
      }
    }

    // ---------- Timer ----------
    function setTimerLabel(s){ timerRing.setAttribute('data-time', s+ 's'); }
    function runTimer(){
      stopTimer(); setTimerLabel(session.timerSec);
      tHandle = setInterval(()=>{
        const label = timerRing.getAttribute('data-time');
        const left = Number(label?.replace('s',''))||0;
        const next = Math.max(0, left-1);
        setTimerLabel(next);
        if(next<=0){ stopTimer(); chooseTimeout(); }
      }, 1000);
    }
    function stopTimer(){ if(tHandle){ clearInterval(tHandle); tHandle=null; } }
    function chooseTimeout(){
      if(isLocked) return; isLocked = true;
      const card = session.current;
      const row = card.row;
      session.times.push(session.timerSec);
      // Timeout counts as an attempt and a miss
      recordAttempt(row, false, '⏳');
      session.mistakes.push({ row, chosen: '⏳', correct: card.options[card.correctIdx] });
      const buttons = qsa('button', optionsBox);
      buttons.forEach((b)=> b.classList.add('pointer-events-none'));
      buttons.forEach((b, idx)=>{
        const num = b.querySelector('.optnum');
        if(idx===card.correctIdx){
          b.classList.remove('border-slate-200');
          b.classList.add('bg-green-500','text-white','border-green-600');
          if(num) num.classList.add('text-white');
        } else { b.classList.add('opacity-60'); }
      });
      setTimeout(()=>{ isLocked=false; session.idx++; renderNext(); }, 1100);
    }

    // ---------- Results & History ----------
    function endSession(){ sessionAlive = false;
      stopTimer();
      const total = session.total; const correct = session.score; const acc = total ? Math.round((correct/total)*100) : 0;
      const avg = session.times.length ? (session.times.reduce((a,b)=>a+b,0)/session.times.length) : 0;
      const fastest = session.times.length ? Math.min(...session.times) : 0;
      const slowest = session.times.length ? Math.max(...session.times) : 0;
      qs('#stat-acc').innerHTML = `${acc}% <span class="text-slate-400 text-base">(${correct}/${total})</span>`;
      qs('#stat-avg').textContent = avg ? `${avg.toFixed(1)} s` : '—';
      qs('#stat-range').textContent = (fastest && slowest) ? `${fastest.toFixed(1)} s / ${slowest.toFixed(1)} s` : '—';
      const wrongUL = document.getElementById('wrong-list'); wrongUL.innerHTML = '';
      session.mistakes.slice(0,50).forEach(m=>{
        const li = document.createElement('li'); li.className = 'flex items-center gap-2';
        li.innerHTML = `<span class="kn text-xl">${escapeHtml(m.row.prompt)}</span><span>→</span><span class="text-base">${escapeHtml(m.correct)}</span><span class="text-slate-500">(you chose</span><span class="text-base">${escapeHtml(String(m.chosen))}</span><span class="text-slate-500">)</span>`;
        wrongUL.appendChild(li);
      });

      // Save to history (keep last 10)
      const history = HistoryStore.read();
      history.unshift({
        ts: new Date().toISOString(),
        deck: currentDeckName,
        level: 2,
        total,
        correct,
        acc,
        avg: Number(avg.toFixed(2)),
        mode: session.label,
        distractorMode: session.distractorMode,
        wrong: session.mistakes.slice(0,10).map(m=>({ prompt:m.row.prompt, correct:m.correct }))
      });
      HistoryStore.write(history);
      renderQuickStats();
      show('results');
    }

    function renderQuickStats(){
      const history = HistoryStore.read();
      const progress = ProgressStore.get();
      const totalSessions = history.length;
      const avgAcc = totalSessions > 0
        ? Math.round(history.reduce((s, h) => s + h.acc, 0) / totalSessions)
        : 0;
      // Streak: consecutive 100% sessions from most recent
      let streak = 0;
      for(const h of history){ if(h.acc === 100) streak++; else break; }
      const lastInfo = totalSessions > 0
        ? `Last session: ${history[0].correct}/${history[0].total}`
        : '';
      const statsEl = document.getElementById('quick-stats');
      if(statsEl) statsEl.innerHTML = `
        <div class="bg-slate-100 rounded-xl p-4">
          <div class="text-2xl font-bold">${totalSessions}</div>
          <div class="text-sm text-slate-600">Sessions</div>
        </div>
        <div class="bg-slate-100 rounded-xl p-4">
          <div class="text-2xl font-bold">${avgAcc}%</div>
          <div class="text-sm text-slate-600">Avg Accuracy</div>
        </div>
        <div class="bg-slate-100 rounded-xl p-4">
          <div class="text-2xl font-bold">${streak}</div>
          <div class="text-sm text-slate-600">Streak</div>
        </div>`;
      const infoEl = document.getElementById('last-session-info');
      if(infoEl) infoEl.textContent = lastInfo;
    }
    // ---------- History UI ----------
    const historyPanel = document.getElementById('history-panel');
    const historyList = document.getElementById('history-list');
    document.getElementById('btn-toggle-history')?.addEventListener('click', ()=>{
      const btn = document.getElementById('btn-toggle-history');
      if(historyPanel?.classList.contains('hidden')){
        renderHistory();
        historyPanel.classList.remove('hidden');
        if(btn) btn.textContent = 'Hide History';
      } else {
        historyPanel?.classList.add('hidden');
        if(btn) btn.textContent = 'Show History';
      }
    });
    document.getElementById('btn-clear-history')?.addEventListener('click', ()=>{ HistoryStore.clear(); renderHistory(); });

    function renderHistory(){
      if(!historyList) return;
      const data = HistoryStore.read();
      historyList.innerHTML = '';
      if(!data.length){
        const li = document.createElement('li');
        li.className = 'py-2 text-slate-500';
        li.textContent = 'No runs yet.';
        historyList.appendChild(li);
        return;
      }
      data.slice(0,10).forEach(item=>{
        const li = document.createElement('li');
        li.className = 'py-2 flex flex-col gap-1';
        const dt = new Date(item.ts);
        const title = `${dt.toLocaleDateString()} ${dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} • ${item.deck}`;
        li.innerHTML = `
          <div class="flex items-center justify-between">
            <div class="font-medium text-slate-700 text-sm">${escapeHtml(title)}</div>
            <div class="text-xs text-slate-500">Matras</div>
          </div>
          <div class="text-xs text-slate-600">${item.correct}/${item.total} correct • ${item.acc}% • avg ${item.avg}s${item.mode ? ` • ${escapeHtml(item.mode)}` : ''}</div>
          ${item.wrong && item.wrong.length ? `<div class="text-xs text-slate-500">Wrong: ${item.wrong.map(w=>`${escapeHtml(w.prompt)}→${escapeHtml(w.correct)}`).join(', ')}</div>` : ''}
        `;
        historyList.appendChild(li);
      });
    }

    // ---------- Shortcuts ----------
    document.addEventListener('keydown', (e)=>{
      if(!screens.play?.classList.contains('active')) return;
      if(['1','2','3','4'].includes(e.key)){
        const idx = Number(e.key)-1; const card = session.current; if(card && card.options[idx]!==undefined) choose(idx);
      } else if(e.key===' '){ e.preventDefault(); stopTimer(); chooseTimeout(); }
      else if(e.key==='Escape'){ stopTimer(); }
    });

    // ---------- Utils ----------
    function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=> ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

    // ---------- Wire up ----------
    document.getElementById('btn-start')?.addEventListener('click', ()=>{ startSession(); });

    document.getElementById('btn-weak')?.addEventListener('click', ()=>{ startSession({ weakOnly:true }); });


    document.getElementById('btn-newrun')?.addEventListener('click', ()=> show('home'));
    document.getElementById('btn-retry-mistakes')?.addEventListener('click', ()=> startSession({ fromMistakesOnly:true }));

    // Init
    Settings.load();
    renderHistory();
    renderQuickStats();

})();
  </script>
</body>
</html>
